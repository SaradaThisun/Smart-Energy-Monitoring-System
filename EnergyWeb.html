<!DOCTYPE html>
<html>
<head>
    <title>Smart Energy Dashboard</title>
    <link rel="stylesheet" href="EnergyWeb.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <div class="top-bar">
        <h2>Overview</h2>
        <h2 class="device-name">ESP32</h2>
    </div>

    <div class="container">

        <!-- LEFT CARD -->
        <div class="card left-card">
            <h3>Power (W)</h3>
            <div class="current-value" id="currentValue">
                0.00
            </div>
        </div>

        <!-- RIGHT CARD -->
        <div class="card right-card">
            <h3>Power</h3>
            <canvas id="currentChart"></canvas>
        </div>

    </div>

<script src="EnergyWeb.js"></script>
</body>
</html>
